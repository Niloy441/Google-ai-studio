{% extends "base.html" %}

{% block title %}Console Login - OTPAuth{% endblock %}

{% block content %}
<div class="auth-card console-card">
    <div class="console-badge">ADMIN CONSOLE</div>
    <h2>Restricted Access</h2>
    <p class="subtitle">Please authenticate to continue</p>
    
    <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
            {{ form.username }}
            {{ form.username.errors }}
        </div>
        <div class="form-group">
            {{ form.password }}
            {{ form.password.errors }}
        </div>
        <button type="submit" class="btn btn-dark">Login to Console</button>
    </form>
</div>
{% endblock %}
